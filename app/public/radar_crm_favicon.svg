<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="24" cy="24" r="22"/>
    </clipPath>
  </defs>

  <!-- Fundo circular -->
  <circle cx="24" cy="24" r="24" fill="url(#bg)"/>

  <!-- Arcos do radar -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="#00C896" stroke-width="1.2" stroke-opacity="0.25"/>
  <circle cx="24" cy="24" r="12" fill="none" stroke="#00C896" stroke-width="1.2" stroke-opacity="0.35"/>
  <circle cx="24" cy="24" r="6"  fill="none" stroke="#00C896" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Setor de varredura -->
  <g clip-path="url(#clip)">
    <path d="M24 24 L24 6 A18 18 0 0 1 40.5 33 Z" fill="#00C896" fill-opacity="0.15"/>
  </g>

  <!-- Linha de varredura -->
  <line x1="24" y1="24" x2="40.5" y2="33" stroke="#00C896" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.9"/>

  <!-- Ponto central -->
  <circle cx="24" cy="24" r="2.5" fill="#00C896"/>

  <!-- Ponto de alvo detectado -->
  <circle cx="32" cy="12" r="2" fill="#00C896"/>
  <circle cx="32" cy="12" r="3.5" fill="none" stroke="#00C896" stroke-width="1" stroke-opacity="0.5"/>
</svg>
